provider: Sisense
providerId: sisense
publisherName: Sisense Inc.
serviceCategory: Analytics / Business Intelligence
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Analytics
  - Business Intelligence
  - Embedded Analytics
  - FinOps
  - FOCUS
description: 'FOCUS-aligned FinOps for Sisense: tiered subscription with bundled storage, Sisense
  credits, and seat counts; per-seat and per-credit add-ons; Scale tier negotiated.'
sources:
  - https://www.sisense.com/pricing/
billingModel:
  pricingCategory: Tiered Subscription
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Tax
    - Adjustment
focusColumns:
  ServiceName: Sisense
  ServiceCategory: Analytics / Business Intelligence
  ProviderName: Sisense
  PublisherName: Sisense Inc.
  InvoiceIssuerName: Sisense Inc.
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
  - name: subscription_month
    description: Monthly subscription fee for the selected plan tier (Launch, Grow, Scale).
    unit: month
    aggregation: sum
    dimensions:
      - plan
  - name: storage
    description: Storage consumed against plan allowance (20 GB / 80 GB / custom).
    unit: GB-month
    aggregation: max
    dimensions:
      - plan
      - environment
  - name: sisense_credits
    description: Compute / query credits consumed; pool replenishes monthly per plan.
    unit: varies
    aggregation: sum
    dimensions:
      - plan
      - workload
  - name: designer_seats
    description: Active designer seats counted against plan minimums; additional seats are billable.
    unit: seat
    aggregation: max
    dimensions:
      - plan
  - name: viewer_seats
    description: Active viewer seats counted against plan minimums; additional seats are billable.
    unit: seat
    aggregation: max
    dimensions:
      - plan
principles:
  - name: Visibility
    description: Track Sisense credit burn, storage utilization, and seat counts in the Sisense
      admin console; alert before any pool reaches 80% to time tier upgrades.
  - name: Allocation
    description: Allocate cost per embedding tenant or workload by tagging dashboards and using
      multi-environment support (Grow and above) to separate dev/staging/production credit usage.
  - name: Optimization
    description: Optimize credit consumption by caching dashboards, reducing query frequency, and
      consolidating viewer seats; consider BYO LLM (Grow+) to control AI inference cost externally.
  - name: Accountability
    description: Embedded-analytics product owner reviews monthly credit / seat / storage telemetry
      and approves seat or credit purchases vs. plan upgrades.
maintainers:
