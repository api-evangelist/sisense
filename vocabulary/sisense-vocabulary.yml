vocabulary:
  name: Sisense Vocabulary
  description: >-
    Domain vocabulary for Sisense business intelligence and embedded analytics
    platform, covering dashboards, data models, users, access control, and
    programmatic administration.
  version: '1.0'
  created: '2026-05-02'
  modified: '2026-05-02'
  terms:
    - term: Dashboard
      definition: >-
        A Sisense analytics canvas containing multiple widgets (charts, tables,
        KPIs) that visualize data from one or more Elasticube or live data models.
      aliases:
        - Analytics Dashboard
        - Report

    - term: Widget
      definition: >-
        An individual visualization component within a dashboard, such as a bar
        chart, line chart, pivot table, indicator, or custom visualization.

    - term: Elasticube
      definition: >-
        Sisense's proprietary columnar in-memory database used to store and
        index extracted data for high-performance analytics queries.
      aliases:
        - ECube
        - Data Cube

    - term: Live Data Model
      definition: >-
        A Sisense data model that queries the source database directly in
        real-time rather than extracting data into an Elasticube. Also called
        a "live" model or live connection.
      aliases:
        - Live Model
        - Live Connection

    - term: Datamodel
      definition: >-
        The v2 API term for both extract-based (Elasticube) and live data models,
        providing a unified schema definition with tables, fields, and joins.

    - term: Build
      definition: >-
        The process of extracting data from source systems and loading it into
        an Elasticube. Build types: full replace (rebuild all data) and
        accumulate (append new data only).

    - term: Data Security Rule
      definition: >-
        A row-level security filter applied to an Elasticube column that restricts
        which data rows a specific user or group can see in dashboards.
      aliases:
        - Row-Level Security
        - RLS

    - term: Share
      definition: >-
        A permission entry granting a user or group access to a dashboard with
        either view (read-only) or edit (full access) rights.

    - term: Role
      definition: >-
        A predefined access tier determining what platform actions a user can
        perform. Roles from lowest to highest: viewer, designer, analyst,
        dataDesigner, admin.

    - term: Group
      definition: >-
        A collection of users that can be assigned shared permissions, data
        security rules, and dashboard access as a unit.

    - term: Folder
      definition: >-
        An organizational container in the Sisense portal for grouping related
        dashboards together for easier navigation.

    - term: Embed SDK
      definition: >-
        Sisense's JavaScript SDK for embedding dashboards and widgets into
        third-party web applications with full customization support.
      aliases:
        - Sisense.js
        - Embedded Analytics SDK

    - term: Compose SDK
      definition: >-
        Sisense's React/Angular/Vue component library for building custom
        analytics applications using Sisense data and query capabilities.

    - term: OEM
      definition: >-
        Original Equipment Manufacturer - a Sisense partner who embeds Sisense
        analytics into their own product, typically managing multiple tenant
        deployments programmatically via the REST API.

    - term: RBAC
      definition: >-
        Role-Based Access Control - the Sisense permission system governing
        user access to platform features based on assigned roles.

    - term: Bearer Token
      definition: >-
        The authentication credential used in API requests, obtained from
        POST /api/v1/authentication/login or generated in User Profiles settings.

    - term: Pagination
      definition: >-
        Sisense API pagination using limit (max results) and skip (offset)
        query parameters to retrieve large result sets in pages.
