specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Sisense
providerId: sisense
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Analytics
  - Business Intelligence
  - Embedded Analytics
  - Rate Limiting
description: Sisense REST API documentation is gated behind a customer / partner login at
  docs.sisense.com. Public Sisense documentation does not enumerate numeric API rate limits, response
  headers, or throttle codes outside the authenticated portal. This artifact is a low-confidence
  placeholder until those docs are reachable.
sources:
  - https://www.sisense.com/pricing/
  - https://docs.sisense.com/
notes: |
  docs.sisense.com requires an authenticated session; public surface does not publish numeric
  request-rate caps for the Sisense REST or Compose SDK APIs.
responseCodes:
  throttled: 429
limits:
  - name: Tenant API Throughput
    scope: tenant
    metric: varies
    limit: 'see authenticated Sisense REST API documentation'
    notes: Numeric per-second / per-minute caps are not published outside the customer docs portal.
  - name: Sisense Credits Pool
    scope: tenant
    metric: varies
    limit: 'plan-dependent (20K / 50K / custom)'
    notes: Credits are a plan-level consumption pool, not a per-request rate cap; tracked in plans.
policies:
  - name: Plan-Tier Capacity
    description: Storage, credits, and seat counts are enforced at plan level (Launch / Grow / Scale)
      and are tracked in plans/sisense-plans-pricing.yml.
  - name: Backoff
    description: Clients should implement exponential backoff with jitter on any 429 / 503 response
      from the Sisense REST API and honor Retry-After when present.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
