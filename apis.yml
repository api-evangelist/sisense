aid: sisense
name: Sisense
description: >-
  Sisense is a business intelligence and analytics platform that enables organizations to build and embed analytics into
  applications and workflows. It provides REST APIs for managing dashboards, data models (Elasticubes and live models),
  users, groups, data security rules, and builds. The platform supports both extract-based and live data model
  architectures with comprehensive programmatic administration capabilities.
type: Index
position: Consumer
access: 3rd-Party
