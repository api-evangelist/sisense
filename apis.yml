apis:
  - aid: sisense:rest-api-v1
    name: Sisense REST API v1
    description: >-
      The Sisense REST API v1 provides programmatic access to dashboards, users, groups, Elasticubes, data security
      rules, and builds. It supports both extract-based Elasticube models and live data models. Authentication uses
      Bearer tokens obtained via the login endpoint or from User Profiles settings.
    humanURL: https://developer.sisense.com/guides/restApi/v1/
    baseURL: https://your-sisense-host/api/v1
    tags:
      - Dashboards
      - Users
      - Groups
      - Elasticubes
      - Data Models
      - Analytics
    properties:
      - type: Documentation
        url: https://developer.sisense.com/guides/restApi/v1/
      - type: OpenAPI
        url: https://raw.githubusercontent.com/api-evangelist/sisense/refs/heads/main/openapi/sisense-rest-api-openapi.yml
  - aid: sisense:rest-api-v2
    name: Sisense REST API v2
    description: >-
      The Sisense REST API v2 provides access to Datamodels (the v2 replacement for Elasticubes), builds, and advanced
      data model management capabilities including schema management, field configuration, and live data model
      operations.
    humanURL: https://developer.sisense.com/guides/restApi/v2/
    baseURL: https://your-sisense-host/api/v2
    tags:
      - Data Models
      - Builds
      - Analytics
    properties:
      - type: Documentation
        url: https://developer.sisense.com/guides/restApi/v2/
  - aid: sisense:user-role-management-api
    name: Sisense User and Role Management API
    description: >-
      The Sisense User and Role Management API (RBAC) enables administrators to manage users, roles, and permissions
      programmatically. Available on select plans through contact with Customer Success Manager.
    humanURL: https://dtdocs.sisense.com/article/user-and-role-management-api-rbac
    baseURL: https://your-sisense-host/api/v1
    tags:
      - Users
      - Roles
      - RBAC
      - Identity
    properties:
      - type: Documentation
        url: https://dtdocs.sisense.com/article/user-and-role-management-api-rbac
