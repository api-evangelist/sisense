naftiko: "1.0.0-alpha1"

info:
  label: "Sisense Analytics Administration"
  description: >-
    Unified analytics administration workflow for Sisense BI platform management.
    Combines dashboard management, user and group access control, Elasticube data
    model management, and data security rule configuration. Used by BI administrators,
    OEM partners, and DevOps teams automating Sisense platform operations.
  tags:
    - Analytics
    - Business Intelligence
    - Dashboards
    - Administration
    - Data Security
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SISENSE_API_TOKEN: SISENSE_API_TOKEN
      SISENSE_HOST: SISENSE_HOST

capability:
  consumes:
    - import: sisense
      location: ./shared/sisense.yaml

  exposes:
    - type: rest
      port: 8080
      namespace: analytics-administration-api
      description: "Unified REST API for Sisense analytics platform administration."
      resources:
        - path: /v1/dashboards
          name: dashboards
          description: Manage analytics dashboards
          operations:
            - method: GET
              name: list-dashboards
              description: List user-accessible dashboards
              call: "sisense.list-dashboards"
              with:
                limit: "rest.limit"
                skip: "rest.skip"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-dashboard
              description: Create a new analytics dashboard
              call: "sisense.create-dashboard"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/dashboards/{id}
          name: dashboard
          description: Manage a specific dashboard
          operations:
            - method: GET
              name: get-dashboard
              description: Get dashboard details
              call: "sisense.get-dashboard"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: delete-dashboard
              description: Delete a dashboard
              call: "sisense.delete-dashboard"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/admin/dashboards
          name: admin-dashboards
          description: Admin dashboard access
          operations:
            - method: GET
              name: list-all-dashboards
              description: List all dashboards (admin)
              call: "sisense.list-all-dashboards"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/users
          name: users
          description: Manage platform users
          operations:
            - method: GET
              name: list-users
              description: List all users
              call: "sisense.list-users"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-user
              description: Create a new user
              call: "sisense.create-user"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/users/{id}
          name: user
          description: Manage a specific user
          operations:
            - method: GET
              name: get-user
              description: Get user details
              call: "sisense.get-user"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: DELETE
              name: delete-user
              description: Remove a user
              call: "sisense.delete-user"
              with:
                id: "rest.id"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/groups
          name: groups
          description: Manage user groups
          operations:
            - method: GET
              name: list-groups
              description: List user groups
              call: "sisense.list-groups"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-group
              description: Create a user group
              call: "sisense.create-group"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/elasticubes
          name: elasticubes
          description: Manage Elasticube data models
          operations:
            - method: GET
              name: list-elasticubes
              description: List all Elasticubes
              call: "sisense.list-elasticubes"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9090
      namespace: analytics-administration-mcp
      transport: http
      description: "MCP server for AI-assisted Sisense analytics platform administration."
      tools:
        - name: list-dashboards
          description: List analytics dashboards accessible to the current user
          hints:
            readOnly: true
            openWorld: true
          call: "sisense.list-dashboards"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-all-dashboards
          description: List all dashboards across all users (admin access required)
          hints:
            readOnly: true
            openWorld: false
          call: "sisense.list-all-dashboards"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-dashboard
          description: Get details for a specific dashboard including its configuration
          hints:
            readOnly: true
            openWorld: false
          call: "sisense.get-dashboard"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-dashboard
          description: Create a new analytics dashboard in Sisense
          hints:
            readOnly: false
            destructive: false
          call: "sisense.create-dashboard"
          with:
            title: "tools.title"
            desc: "tools.desc"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-dashboard
          description: Delete an analytics dashboard
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "sisense.delete-dashboard"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-users
          description: List all users in the Sisense platform
          hints:
            readOnly: true
            openWorld: false
          call: "sisense.list-users"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-user
          description: Create a new Sisense user with specified role and group assignments
          hints:
            readOnly: false
            destructive: false
          call: "sisense.create-user"
          with:
            email: "tools.email"
            firstName: "tools.firstName"
            lastName: "tools.lastName"
            role: "tools.role"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-user
          description: Get details for a specific user account
          hints:
            readOnly: true
            openWorld: false
          call: "sisense.get-user"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: delete-user
          description: Remove a user from the Sisense platform
          hints:
            readOnly: false
            destructive: true
            idempotent: true
          call: "sisense.delete-user"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-groups
          description: List user groups configured for access control
          hints:
            readOnly: true
            openWorld: false
          call: "sisense.list-groups"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-group
          description: Create a new user group for organizing access control
          hints:
            readOnly: false
            destructive: false
          call: "sisense.create-group"
          with:
            name: "tools.name"
            description: "tools.description"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-elasticubes
          description: List all Elasticube data models in the Sisense platform
          hints:
            readOnly: true
            openWorld: false
          call: "sisense.list-elasticubes"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-data-security-rules
          description: Get row-level data security rules configured for an Elasticube
          hints:
            readOnly: true
            openWorld: false
          call: "sisense.get-data-security-rules"
          with:
            server: "tools.server"
            elasticube: "tools.elasticube"
          outputParameters:
            - type: object
              mapping: "$."
