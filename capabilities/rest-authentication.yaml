naftiko: 1.0.0-alpha2
info:
  label: Sisense REST API — Authentication
  description: 'Sisense REST API — Authentication. 1 operations. Lead operation: Login and Get Token. Self-contained Naftiko
    capability covering one Sisense business surface.'
  tags:
  - Sisense
  - Authentication
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SISENSE_API_KEY: SISENSE_API_KEY
capability:
  consumes:
  - type: http
    namespace: rest-authentication
    baseUri: https://{host}/api/v1
    description: Sisense REST API — Authentication business capability. Self-contained, no shared references.
    resources:
    - name: authentication-login
      path: /authentication/login
      operations:
      - name: login
        method: POST
        description: Login and Get Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.SISENSE_API_KEY}}'
  exposes:
  - type: rest
    namespace: rest-authentication-rest
    port: 8080
    description: REST adapter for Sisense REST API — Authentication. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/authentication/login
      name: authentication-login
      description: REST surface for authentication-login.
      operations:
      - method: POST
        name: login
        description: Login and Get Token
        call: rest-authentication.login
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rest-authentication-mcp
    port: 9090
    transport: http
    description: MCP adapter for Sisense REST API — Authentication. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: login-and-get-token
      description: Login and Get Token
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: rest-authentication.login
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
