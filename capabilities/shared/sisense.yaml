naftiko: "1.0.0-alpha1"

info:
  label: "Sisense REST API"
  description: >-
    The Sisense REST API provides programmatic access to dashboards, users,
    groups, Elasticubes, data security rules, and analytics platform management.
  tags:
    - Analytics
    - Business Intelligence
    - Dashboards
    - Data Models
  created: "2026-05-02"
  modified: "2026-05-02"

binds:
  - namespace: env
    keys:
      SISENSE_API_TOKEN: SISENSE_API_TOKEN
      SISENSE_HOST: SISENSE_HOST

capability:
  consumes:
    - type: http
      namespace: sisense
      baseUri: "https://{{SISENSE_HOST}}/api/v1"
      description: "Sisense REST API v1 for analytics platform management"
      authentication:
        type: bearer
        token: "{{SISENSE_API_TOKEN}}"
      resources:
        - name: dashboards
          path: /dashboards
          description: Manage analytics dashboards
          operations:
            - name: list-dashboards
              method: GET
              description: List dashboards accessible to the authenticated user
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: Maximum number of results
                - name: skip
                  in: query
                  type: integer
                  required: false
                  description: Number of results to skip
                - name: fields
                  in: query
                  type: string
                  required: false
                  description: Comma-separated fields to include
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-dashboard
              method: POST
              description: Create a new dashboard
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  title: "{{tools.title}}"
                  desc: "{{tools.desc}}"

        - name: dashboard
          path: /dashboards/{id}
          description: Manage a specific dashboard
          operations:
            - name: get-dashboard
              method: GET
              description: Get a specific dashboard by ID
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: Dashboard identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-dashboard
              method: DELETE
              description: Delete a dashboard
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: Dashboard identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: dashboards-admin
          path: /dashboards/admin
          description: Admin-level dashboard access
          operations:
            - name: list-all-dashboards
              method: GET
              description: List all dashboards across all users (admin only)
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: Maximum number of results
                - name: skip
                  in: query
                  type: integer
                  required: false
                  description: Results to skip
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: users
          path: /users
          description: Manage platform users
          operations:
            - name: list-users
              method: GET
              description: List users in the system
              inputParameters:
                - name: limit
                  in: query
                  type: integer
                  required: false
                  description: Maximum number of results
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-user
              method: POST
              description: Create a new user
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  email: "{{tools.email}}"
                  firstName: "{{tools.firstName}}"
                  lastName: "{{tools.lastName}}"
                  role: "{{tools.role}}"

        - name: user
          path: /users/{id}
          description: Manage a specific user
          operations:
            - name: get-user
              method: GET
              description: Get a user by ID
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: User identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: delete-user
              method: DELETE
              description: Delete a user
              inputParameters:
                - name: id
                  in: path
                  type: string
                  required: true
                  description: User identifier
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: groups
          path: /groups
          description: Manage user groups
          operations:
            - name: list-groups
              method: GET
              description: List user groups
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-group
              method: POST
              description: Create a new user group
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  name: "{{tools.name}}"
                  description: "{{tools.description}}"

        - name: elasticubes
          path: /elasticubes/getElasticubes
          description: List Elasticube data models
          operations:
            - name: list-elasticubes
              method: GET
              description: List all Elasticube data models
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."

        - name: data-security
          path: /elasticubes/{server}/{elasticube}/datasecurity
          description: Manage data security rules for Elasticubes
          operations:
            - name: get-data-security-rules
              method: GET
              description: Get all data security rules for an Elasticube
              inputParameters:
                - name: server
                  in: path
                  type: string
                  required: true
                  description: Server name (use LocalHost for single-node)
                - name: elasticube
                  in: path
                  type: string
                  required: true
                  description: Elasticube title
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
            - name: create-data-security-rule
              method: POST
              description: Create a data security rule for an Elasticube
              inputParameters:
                - name: server
                  in: path
                  type: string
                  required: true
                  description: Server name
                - name: elasticube
                  in: path
                  type: string
                  required: true
                  description: Elasticube title
              outputRawFormat: json
              outputParameters:
                - name: result
                  type: object
                  value: "$."
              body:
                type: json
                data:
                  column: "{{tools.column}}"
                  table: "{{tools.table}}"
                  members: "{{tools.members}}"

  exposes:
    - type: rest
      port: 8100
      namespace: sisense-rest
      resources:
        - path: /v1/dashboards
          name: dashboards
          description: Manage dashboards
          operations:
            - method: GET
              name: list-dashboards
              description: List dashboards
              call: "sisense.list-dashboards"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-dashboard
              description: Create a dashboard
              call: "sisense.create-dashboard"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/users
          name: users
          description: Manage users
          operations:
            - method: GET
              name: list-users
              description: List users
              call: "sisense.list-users"
              outputParameters:
                - type: object
                  mapping: "$."
            - method: POST
              name: create-user
              description: Create a user
              call: "sisense.create-user"
              outputParameters:
                - type: object
                  mapping: "$."
        - path: /v1/groups
          name: groups
          description: Manage groups
          operations:
            - method: GET
              name: list-groups
              description: List user groups
              call: "sisense.list-groups"
              outputParameters:
                - type: object
                  mapping: "$."

    - type: mcp
      port: 9100
      namespace: sisense-mcp
      transport: http
      tools:
        - name: list-dashboards
          description: List dashboards accessible to the current user
          hints:
            readOnly: true
            openWorld: true
          call: "sisense.list-dashboards"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-all-dashboards
          description: List all dashboards across all users (requires admin)
          hints:
            readOnly: true
            openWorld: false
          call: "sisense.list-all-dashboards"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-dashboard
          description: Get a specific dashboard by ID
          hints:
            readOnly: true
            openWorld: false
          call: "sisense.get-dashboard"
          with:
            id: "tools.id"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-dashboard
          description: Create a new analytics dashboard
          hints:
            readOnly: false
            destructive: false
          call: "sisense.create-dashboard"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-users
          description: List users in the Sisense platform
          hints:
            readOnly: true
            openWorld: false
          call: "sisense.list-users"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-user
          description: Create a new Sisense user with role assignment
          hints:
            readOnly: false
            destructive: false
          call: "sisense.create-user"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-groups
          description: List user groups for access control
          hints:
            readOnly: true
            openWorld: false
          call: "sisense.list-groups"
          outputParameters:
            - type: object
              mapping: "$."
        - name: create-group
          description: Create a new user group for access control
          hints:
            readOnly: false
            destructive: false
          call: "sisense.create-group"
          outputParameters:
            - type: object
              mapping: "$."
        - name: list-elasticubes
          description: List all Elasticube data models
          hints:
            readOnly: true
            openWorld: false
          call: "sisense.list-elasticubes"
          outputParameters:
            - type: object
              mapping: "$."
        - name: get-data-security-rules
          description: Get data security rules configured for an Elasticube
          hints:
            readOnly: true
            openWorld: false
          call: "sisense.get-data-security-rules"
          with:
            server: "tools.server"
            elasticube: "tools.elasticube"
          outputParameters:
            - type: object
              mapping: "$."
