naftiko: 1.0.0-alpha2
info:
  label: Sisense REST API — Groups
  description: 'Sisense REST API — Groups. 3 operations. Lead operation: List Groups. Self-contained Naftiko capability covering
    one Sisense business surface.'
  tags:
  - Sisense
  - Groups
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SISENSE_API_KEY: SISENSE_API_KEY
capability:
  consumes:
  - type: http
    namespace: rest-groups
    baseUri: https://{host}/api/v1
    description: Sisense REST API — Groups business capability. Self-contained, no shared references.
    resources:
    - name: groups
      path: /groups
      operations:
      - name: listgroups
        method: GET
        description: List Groups
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: limit
          in: query
          type: integer
        - name: skip
          in: query
          type: integer
      - name: creategroup
        method: POST
        description: Create Group
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: groups-id
      path: /groups/{id}
      operations:
      - name: deletegroup
        method: DELETE
        description: Delete Group
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: id
          in: path
          type: string
          description: Group identifier
          required: true
    authentication:
      type: bearer
      token: '{{env.SISENSE_API_KEY}}'
  exposes:
  - type: rest
    namespace: rest-groups-rest
    port: 8080
    description: REST adapter for Sisense REST API — Groups. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/groups
      name: groups
      description: REST surface for groups.
      operations:
      - method: GET
        name: listgroups
        description: List Groups
        call: rest-groups.listgroups
        with:
          limit: rest.limit
          skip: rest.skip
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: creategroup
        description: Create Group
        call: rest-groups.creategroup
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/groups/{id}
      name: groups-id
      description: REST surface for groups-id.
      operations:
      - method: DELETE
        name: deletegroup
        description: Delete Group
        call: rest-groups.deletegroup
        with:
          id: rest.id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rest-groups-mcp
    port: 9090
    transport: http
    description: MCP adapter for Sisense REST API — Groups. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: list-groups
      description: List Groups
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rest-groups.listgroups
      with:
        limit: tools.limit
        skip: tools.skip
      outputParameters:
      - type: object
        mapping: $.
    - name: create-group
      description: Create Group
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: rest-groups.creategroup
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: delete-group
      description: Delete Group
      hints:
        readOnly: false
        destructive: true
        idempotent: true
      call: rest-groups.deletegroup
      with:
        id: tools.id
      outputParameters:
      - type: object
        mapping: $.
